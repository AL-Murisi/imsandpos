<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0b142a 0%, #132347 55%, #18325f 100%);
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .card {
        width: min(92vw, 420px);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #dbe7ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Offline</h1>
      <p>The app could not reach the network. Reconnect and try again.</p>
    </main>
  </body>
</html>
